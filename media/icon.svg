<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect x="8" y="8" width="240" height="240" rx="40" ry="40" fill="url(#bg)" />
  <!-- Grid lines for spreadsheet look -->
  <line x1="40" y1="80" x2="216" y2="80" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="40" y1="120" x2="216" y2="120" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="40" y1="160" x2="216" y2="160" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="40" y1="200" x2="216" y2="200" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="100" y1="60" x2="100" y2="216" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <line x1="160" y1="60" x2="160" y2="216" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Bold R letter -->
  <text x="128" y="160" font-family="Arial, Helvetica, sans-serif" font-size="130" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="central">R</text>
</svg>
